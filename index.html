<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIRE Planner</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #9294a0;
      --accent: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
    }

    .card {
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.25rem;
    }

    p {
      margin: 0 0 0.75rem;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>FIRE Planner</h1>
    <p>The planner and asset-management tools now live in a single built app.</p>
    <p>Open <a href="dist/index.html">dist/index.html</a> after running a build, or use the Vite dev server during development.</p>
    <p>For development, run <code>npm run dev</code> and use the Vite URL.</p>
  </div>
</body>
</html>
